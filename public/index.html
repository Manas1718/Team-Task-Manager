<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Ethara AI Team Task Manager - Manage projects, assign tasks, and track progress with role-based access control.">
  <title>Ethara AI — Task Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="app">
    <!-- Auth Screen -->
    <div id="auth-screen" class="screen active">
      <div class="auth-container">
        <div class="auth-brand">
          <div class="brand-glow"></div>
          <div class="brand-content">
            <div class="brand-logo">
              <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                <rect width="48" height="48" rx="12" fill="url(#logo-grad)"/>
                <path d="M14 34V18L24 12L34 18V34L24 28L14 34Z" stroke="white" stroke-width="2.5" fill="none"/>
                <circle cx="24" cy="22" r="4" fill="white" opacity="0.9"/>
                <defs><linearGradient id="logo-grad" x1="0" y1="0" x2="48" y2="48"><stop stop-color="#8b5cf6"/><stop offset="1" stop-color="#06b6d4"/></linearGradient></defs>
              </svg>
              <h1>Ethara AI</h1>
            </div>
            <p class="brand-tagline">Intelligent Task Management for Modern Teams</p>
            <div class="brand-features">
              <div class="brand-feature"><span class="feature-icon">📊</span><span>Real-time Dashboard</span></div>
              <div class="brand-feature"><span class="feature-icon">👥</span><span>Team Collaboration</span></div>
              <div class="brand-feature"><span class="feature-icon">🔒</span><span>Role-based Access</span></div>
              <div class="brand-feature"><span class="feature-icon">📋</span><span>Smart Task Tracking</span></div>
            </div>
          </div>
        </div>
        <div class="auth-form-wrapper">
          <div class="auth-form-card">
            <div class="auth-tabs">
              <button class="auth-tab active" data-tab="login" id="login-tab-btn">Sign In</button>
              <button class="auth-tab" data-tab="signup" id="signup-tab-btn">Sign Up</button>
            </div>
            <div id="auth-error" class="auth-error hidden"></div>
            <form id="login-form" class="auth-form">
              <div class="form-group">
                <label for="login-email">Email</label>
                <input type="email" id="login-email" placeholder="you@ethara.ai" required>
              </div>
              <div class="form-group">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" placeholder="••••••••" required>
              </div>
              <button type="submit" class="btn btn-primary btn-full" id="login-submit-btn">
                <span>Sign In</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
              </button>
            </form>
            <form id="signup-form" class="auth-form hidden">
              <div class="form-group">
                <label for="signup-name">Full Name</label>
                <input type="text" id="signup-name" placeholder="John Doe" required>
              </div>
              <div class="form-group">
                <label for="signup-email">Email</label>
                <input type="email" id="signup-email" placeholder="you@ethara.ai" required>
              </div>
              <div class="form-group">
                <label for="signup-password">Password</label>
                <input type="password" id="signup-password" placeholder="Min 6 characters" required minlength="6">
              </div>
              <div class="form-group">
                <label for="signup-role">Role</label>
                <select id="signup-role">
                  <option value="member">Member</option>
                  <option value="admin">Admin</option>
                </select>
              </div>
              <button type="submit" class="btn btn-primary btn-full" id="signup-submit-btn">
                <span>Create Account</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <!-- Main App -->
    <div id="main-app" class="screen">
      <!-- Sidebar -->
      <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-logo">
            <svg width="32" height="32" viewBox="0 0 48 48" fill="none">
              <rect width="48" height="48" rx="12" fill="url(#logo-grad2)"/>
              <path d="M14 34V18L24 12L34 18V34L24 28L14 34Z" stroke="white" stroke-width="2.5" fill="none"/>
              <circle cx="24" cy="22" r="4" fill="white" opacity="0.9"/>
              <defs><linearGradient id="logo-grad2" x1="0" y1="0" x2="48" y2="48"><stop stop-color="#8b5cf6"/><stop offset="1" stop-color="#06b6d4"/></linearGradient></defs>
            </svg>
            <span>Ethara AI</span>
          </div>
        </div>
        <nav class="sidebar-nav">
          <a href="#dashboard" class="nav-item active" data-page="dashboard" id="nav-dashboard">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
            <span>Dashboard</span>
          </a>
          <a href="#projects" class="nav-item" data-page="projects" id="nav-projects">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
            <span>Projects</span>
          </a>
          <a href="#tasks" class="nav-item" data-page="tasks" id="nav-tasks">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
            <span>My Tasks</span>
          </a>
          <a href="#team" class="nav-item" data-page="team" id="nav-team">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4-4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
            <span>Team</span>
          </a>
        </nav>
        <div class="sidebar-footer">
          <div class="user-info" id="sidebar-user-info">
            <div class="user-avatar" id="sidebar-avatar">U</div>
            <div class="user-details">
              <span class="user-name" id="sidebar-user-name">User</span>
              <span class="user-role" id="sidebar-user-role">member</span>
            </div>
          </div>
          <button class="btn btn-ghost btn-sm" id="logout-btn" title="Logout">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          </button>
        </div>
      </aside>

      <!-- Main Content -->
      <main id="main-content" class="main-content">
        <div id="page-content"></div>
      </main>
    </div>

    <!-- Modal Overlay -->
    <div id="modal-overlay" class="modal-overlay hidden">
      <div id="modal" class="modal">
        <div class="modal-header">
          <h2 id="modal-title">Modal</h2>
          <button class="btn btn-ghost btn-sm modal-close" id="modal-close-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div id="modal-body" class="modal-body"></div>
      </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
